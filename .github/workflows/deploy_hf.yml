name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://sonambharti:$HF_TOKEN@huggingface.co/spaces/sonambharti/ResumeScreening-ATSScoring main
